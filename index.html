<script>
  /* Copy code */
  function copyCode(btn) {
    const pre = btn.closest('.code-wrap').querySelector('pre');
    navigator.clipboard.writeText(pre.innerText).then(() => {
      btn.textContent = 'Copied ✓';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }

  /* TOC active state */
  const sections = ['overview','prereqs','quickstart','demo1','demo2','demo3','demo4','demo5','customise','download'];
  const links    = {};
  sections.forEach(id => { links[id] = document.querySelector(`.toc-link[href="#${id}"]`); });

  function updateTOC(scrollBar) {
    const offset = 52 + 52 + 20;
    let active = sections[0];
    sections.forEach(id => {
      const el = document.getElementById(id);
      if (el && el.getBoundingClientRect().top + window.scrollY - offset <= window.scrollY) active = id;
    });
    Object.values(links).forEach(l => l && l.classList.remove('active'));
    if (links[active]) {
      links[active].classList.add('active');
      if (scrollBar) {
        links[active].scrollIntoView({ block: 'nearest', inline: 'nearest' });
      }
    }
  }

  /* Back to top */
  const backBtn = document.getElementById('back-top');
  window.addEventListener('scroll', () => {
    updateTOC(true);
    backBtn.classList.toggle('visible', window.scrollY > 400);
  }, { passive: true });

  updateTOC(false);
  if (!window.location.hash) { window.scrollTo(0, 0); }
</script>
